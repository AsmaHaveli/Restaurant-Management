<!DOCTYPE html>
<html>

<head>
    <title>Confirm Order</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-10">

    <div class="max-w-2xl mx-auto bg-white p-6 rounded-xl shadow">

        <h1 class="text-2xl font-bold mb-4">Confirm Order</h1>

        <input id="table" placeholder="Table Number" class="border p-2 w-full mb-3">
        <input id="name" placeholder="Customer Name" class="border p-2 w-full mb-3">
        <input id="phone" placeholder="Phone" class="border p-2 w-full mb-3">

        <div id="summary" class="mb-4"></div>

        <button onclick="payNow()" class="bg-green-600 text-white px-6 py-3 rounded">
            Order Now
        </button>

    </div>

    <script>
        let cart = JSON.parse(localStorage.getItem("cart")) || [];

        function loadSummary() {
            let html = "";
            let total = 0;

            cart.forEach(i => {
                total += i.price * i.qty;
                html += `<p>${i.name} x ${i.qty} = ₹${i.price * i.qty}</p>`;
            });

            document.getElementById("summary").innerHTML = html +
                `<h3 class="mt-3 font-bold">Total: ₹${total}</h3>`;
        }

        loadSummary();

        function payNow() {
            let table = document.getElementById("table").value;
            let name = document.getElementById("name").value;
            let phone = document.getElementById("phone").value;

            fetch("/create_payment", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    table_no: table,
                    name: name,
                    phone: phone,
                    items: cart
                })
            })
                .then(res => res.json())
                .then(data => {
                    alert("Order Placed Successfully!");
                    localStorage.removeItem("cart");
                    window.location.href = "/success";  // or reload page
                });
        }
    </script>

</body>

</html>
