<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A1 | Table Reservations</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Philosopher:wght@400;700&family=Poppins:wght@300;400;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --desi-clay: #a35233;
            --desi-gold: #d4a017;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #fdfaf5;
        }

        .brand-font {
            font-family: 'Philosopher', sans-serif;
        }

        .table-booked {
            background: #fee2e2;
            border: 2px solid #ef4444;
            color: #b91c1c;
        }

        .table-available {
            background: #f0fdf4;
            border: 2px solid #22c55e;
            color: #15803d;
            cursor: pointer;
        }

        .table-selected {
            background: #fbbf24;
            border: 2px solid #d97706;
            color: #000;
        }

        .table-available:hover {
            transform: scale(1.05);
        }

        #toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 9999;
            background: #1a1a1a;
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            border-left: 4px solid #22c55e;
        }

        #toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* Confirmation modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 9000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-card {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            max-width: 380px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.2);
        }

        .modal-card h3 {
            font-family: 'Philosopher', sans-serif;
            font-size: 1.5rem;
            color: #1a1a1a;
            margin-bottom: 0.5rem;
        }

        .modal-card .ref {
            font-size: 1.1rem;
            color: #ea580c;
            font-weight: 700;
            margin: 0.5rem 0;
        }

        .modal-card p {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        .modal-card button {
            background: #ea580c;
            color: white;
            border: none;
            padding: 0.75rem 2rem;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <nav class="bg-white shadow-sm p-4 flex justify-between items-center border-b-4 border-orange-600">
        <h1 class="brand-font text-3xl font-bold text-orange-800">A1 <span class="text-gray-700">Restaurant</span></h1>
        <div class="space-x-4">
            <a href="/" class="text-orange-800 font-bold px-4 py-2">Home</a>
            <a href="/order" class="bg-orange-600 text-white px-6 py-2 rounded-full font-bold shadow-lg">Admin
                Orders</a>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-3 gap-8">

        <!-- TABLE SELECTOR -->
        <div class="lg:col-span-2 bg-white p-8 rounded-3xl shadow-xl border border-orange-100">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-bold text-gray-800 italic">Select Your Table</h2>
                <div class="flex gap-4 text-sm font-bold">
                    <span class="flex items-center gap-1"><span class="w-3 h-3 bg-red-400 rounded-full"></span>
                        Booked</span>
                    <span class="flex items-center gap-1"><span class="w-3 h-3 bg-green-400 rounded-full"></span>
                        Available</span>
                    <span class="flex items-center gap-1"><span class="w-3 h-3 bg-yellow-400 rounded-full"></span>
                        Selected</span>
                </div>
            </div>

            <div id="tableGrid" class="grid grid-cols-3 md:grid-cols-4 gap-6 text-center"></div>

            <div class="mt-12 grid grid-cols-2 gap-4">
                <div class="rounded-2xl overflow-hidden h-32 relative">
                    <img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=500&fit=crop"
                        class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-black/30 flex items-center justify-center text-white font-bold">
                        Indoor Luxury</div>
                </div>
                <div class="rounded-2xl overflow-hidden h-32 relative">
                    <img src="https://images.unsplash.com/photo-1544148103-0773bf10d330?w=500&fit=crop"
                        class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-black/30 flex items-center justify-center text-white font-bold">
                        Outdoor Sitting</div>
                </div>
            </div>
        </div>

        <!-- FORM -->
        <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-orange-100 h-fit">
            <div style="background-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png'); background-color: #5d4037;"
                class="p-6 text-white text-center">
                <h3 class="text-xl font-bold uppercase tracking-widest">Reserve Your Spot</h3>
                <p class="text-orange-200 text-xs" id="selectedTableLabel">Select a table first</p>
            </div>

            <div class="p-6 space-y-4">
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase">Guest Name</label>
                    <input id="guestName" type="text" placeholder="Enter Full Name"
                        class="w-full mt-1 bg-gray-50 border-b-2 border-gray-200 p-2 focus:border-orange-500 outline-none">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase">Mobile Number</label>
                    <input id="guestPhone" type="tel" placeholder="+91 00000 00000"
                        class="w-full mt-1 bg-gray-50 border-b-2 border-gray-200 p-2 focus:border-orange-500 outline-none">
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase">Date</label>
                    <input id="guestDate" type="date"
                        class="w-full mt-1 bg-gray-50 border-b-2 border-gray-200 p-2 focus:border-orange-500 outline-none">
                </div>
                <div class="flex gap-4">
                    <div class="flex-1">
                        <label class="text-xs font-bold text-gray-500 uppercase">Time Slot</label>
                        <select id="guestSlot"
                            class="w-full mt-1 bg-gray-50 border-b-2 border-gray-200 p-2 focus:border-orange-500 outline-none">
                            <option>Lunch (1:00 PM)</option>
                            <option>Dinner (8:00 PM)</option>
                            <option>Evening (6:00 PM)</option>
                        </select>
                    </div>
                    <div class="flex-1">
                        <label class="text-xs font-bold text-gray-500 uppercase">People</label>
                        <input id="guestPeople" type="number" value="2" min="1" max="20"
                            class="w-full mt-1 bg-gray-50 border-b-2 border-gray-200 p-2 focus:border-orange-500 outline-none">
                    </div>
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase">Special Request (Optional)</label>
                    <input id="guestNote" type="text" placeholder="Birthday, anniversary, etc."
                        class="w-full mt-1 bg-gray-50 border-b-2 border-gray-200 p-2 focus:border-orange-500 outline-none">
                </div>

                <button onclick="confirmReservation()" id="submitBtn"
                    class="w-full bg-orange-600 hover:bg-orange-700 text-white font-black py-4 rounded-2xl shadow-lg mt-4 transition uppercase">
                    Confirm Reservation <i class="fa-solid fa-check-double ml-2"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div class="modal" id="successModal">
        <div class="modal-card">
            <div style="font-size:3rem;margin-bottom:0.5rem">🎉</div>
            <h3>Reservation Confirmed!</h3>
            <div class="ref" id="modalRef"></div>
            <p id="modalMsg">Your table has been reserved. We'll see you soon!</p>
            <button onclick="document.getElementById('successModal').classList.remove('show')">Done</button>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        // Tables — pulled fresh on load from reservations API to mark booked
        const tables = [
            { id: 'T-01', label: 'Family (6-8)', icon: 'fa-users' },
            { id: 'T-02', label: 'Couple (2)', icon: 'fa-user-group' },
            { id: 'T-03', label: 'Garden View', icon: 'fa-couch' },
            { id: 'T-04', label: 'General (4)', icon: 'fa-user-group' },
            { id: 'VIP', label: 'AC Room', icon: 'fa-id-card' },
            { id: 'OUT-1', label: 'Outdoor', icon: 'fa-sun' },
        ];

        let selectedTable = null;
        let bookedTables = new Set();

        // Fetch current reservations to determine booked tables (today)
        async function loadBookedTables() {
            try {
                const res = await fetch("/api/reservations");
                const reservations = await res.json();
                const today = new Date().toISOString().split("T")[0];
                reservations.forEach(r => {
                    if (r.date === today && !["Cancelled", "Seated"].includes(r.status)) {
                        bookedTables.add(r.table_no);
                    }
                });
            } catch (e) { /* offline or error, continue */ }
            renderTables();
        }

        function renderTables() {
            const grid = document.getElementById('tableGrid');
            grid.innerHTML = tables.map(t => {
                const isBooked = bookedTables.has(t.id);
                if (isBooked) {
                    return `<div class="table-booked p-6 rounded-2xl flex flex-col items-center justify-center opacity-60 cursor-not-allowed transition">
                    <i class="fa-solid ${t.icon} text-2xl"></i>
                    <span class="font-bold mt-2">${t.id}</span>
                    <span class="text-[10px] uppercase">${t.label}</span>
                    <span class="text-[9px] mt-1">Booked Today</span>
                </div>`;
                }
                const isSelected = selectedTable === t.id;
                const cls = isSelected ? 'table-selected' : 'table-available';
                return `<div class="${cls} p-6 rounded-2xl flex flex-col items-center justify-center transition" onclick="selectTable('${t.id}','${t.label}')">
                <i class="fa-solid ${t.icon} text-2xl"></i>
                <span class="font-bold mt-2">${t.id}</span>
                <span class="text-[10px] uppercase">${t.label}</span>
                ${isSelected ? '<span class="text-[9px] mt-1 font-black">✓ Selected</span>' : ''}
            </div>`;
            }).join('');
        }

        function selectTable(id, label) {
            selectedTable = id;
            document.getElementById('selectedTableLabel').textContent = `Table ${id} — ${label}`;
            renderTables();
        }

        async function confirmReservation() {
            const name = document.getElementById('guestName').value.trim();
            const phone = document.getElementById('guestPhone').value.trim();
            const date = document.getElementById('guestDate').value;
            const slot = document.getElementById('guestSlot').value;
            const people = parseInt(document.getElementById('guestPeople').value);
            const note = document.getElementById('guestNote').value.trim();

            if (!name) { showToast('⚠️ Please enter your name', true); return; }
            if (!phone) { showToast('⚠️ Please enter your phone number', true); return; }
            if (!date) { showToast('⚠️ Please select a date', true); return; }
            if (!selectedTable) { showToast('⚠️ Please select a table first', true); return; }

            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = 'Saving...';

            try {
                const res = await fetch("/api/reservations", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        guest_name: name,
                        phone,
                        date,
                        slot,
                        people,
                        note,
                        table_no: selectedTable
                    })
                });
                const data = await res.json();

                if (data.status === "success") {
                    // Mark as booked locally for this session
                    bookedTables.add(selectedTable);
                    selectedTable = null;
                    renderTables();

                    // Reset form
                    document.getElementById('guestName').value = '';
                    document.getElementById('guestPhone').value = '';
                    document.getElementById('guestNote').value = '';
                    document.getElementById('selectedTableLabel').textContent = 'Select a table first';

                    // Show success modal
                    document.getElementById('modalRef').textContent = data.res_ref;
                    document.getElementById('modalMsg').textContent = `Table reserved for ${name} on ${date} at ${slot}. We look forward to seeing you!`;
                    document.getElementById('successModal').classList.add('show');
                } else {
                    showToast('❌ Something went wrong. Try again.', true);
                }
            } catch (e) {
                showToast('❌ Could not connect to server.', true);
            }

            btn.disabled = false;
            btn.innerHTML = 'Confirm Reservation <i class="fa-solid fa-check-double ml-2"></i>';
        }

        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.borderLeftColor = isError ? '#ef4444' : '#22c55e';
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3500);
        }

        // Set today's date as default
        document.getElementById('guestDate').valueAsDate = new Date();
        loadBookedTables();
    </script>
</body>

</html>
