<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A1 Restaurant Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Background with a food vibe */
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)),
                url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .form-container {
            max-width: 450px;
            width: 90%;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            border-top: 8px solid #e67e22;
            /* Foodie Orange */
        }

        h2 {
            text-align: center;
            color: #2c3e50;
            margin-top: 0;
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .form-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .logo {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #e67e22;
        }

        .food-icon {
            text-align: center;
            color: #e67e22;
            font-size: 24px;
            margin-bottom: 10px;
        }

        label {
            display: block;
            margin-top: 20px;
            font-weight: bold;
            color: #34495e;
            font-size: 14px;
        }

        .input-group {
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 12px;
            top: 15px;
            color: #7f8c8d;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px 12px 12px 40px;
            /* Space for icons */
            margin-top: 8px;
            border-radius: 10px;
            border: 1px solid #ddd;
            box-sizing: border-box;
            transition: all 0.3s ease;
            background: #fdfdfd;
        }

        input:focus,
        textarea:focus {
            border-color: #e67e22;
            outline: none;
            box-shadow: 0 0 8px rgba(230, 126, 34, 0.2);
        }

        button {
            background-color: #e67e22;
            color: white;
            width: 100%;
            padding: 15px;
            margin-top: 30px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            transition: background 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        button:hover {
            background-color: #d35400;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(211, 84, 0, 0.3);
        }

        .welcome-msg {
            text-align: center;
            font-size: 14px;
            color: #7f8c8d;
            margin-top: -10px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div class="form-container">
        <div class="food-icon">
            <i class="fas fa-utensils"></i>
        </div>

        <h2>A1 Restaurant</h2>
        <p class="welcome-msg">Login to your food account</p>

        <div class="form-header">
            <img src="/static/log.jpg.jpeg" alt="logo" class="logo">

        </div>

        <form action="/submit" method="POST">
            <label for="name">Full Name</label>
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" id="name" name="name" placeholder="Enter your name" required>
            </div>

            <label for="email">Email Address</label>
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" name="email" placeholder="email@example.com" required>
            </div>

            <label for="phone">Phone Number</label>
            <div class="input-group">
                <i class="fas fa-phone"></i>
                <input type="tel" id="phone" name="phone" placeholder="+91 0000000000" required>
            </div>

            <label for="address">Delivery Address</label>
            <div class="input-group">
                <i class="fas fa-map-marker-alt" style="top: 20px;"></i>
                <textarea id="address" name="address" rows="3" placeholder="Enter your full address"
                    required></textarea>
            </div>

            <button type="submit">
                <i class="fas fa-sign-in-alt"></i> Register Now
            </button>
        </form>
    </div>
</body>

</html>
