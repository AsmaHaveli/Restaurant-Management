<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visit A1 Restaurant</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* REPLACE 'hotel-bg.jpg' WITH YOUR ACTUAL IMAGE PATH */
            background: linear-gradient(rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)),
                url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            width: 90%;
            max-width: 450px;
            padding: 40px;
            text-align: center;
            color: white;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hotel-title {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            margin-bottom: 5px;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .tagline {
            font-weight: 300;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 30px;
            color: #ffd700;
            /* Gold color */
        }

        .info-row {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .info-row i {
            margin-right: 15px;
            color: #ffd700;
        }

        .menu-status {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
        }

        .status-pill {
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .dot {
            height: 10px;
            width: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        .dot-veg {
            background-color: #4CAF50;
            box-shadow: 0 0 10px #4CAF50;
        }

        .dot-nonveg {
            background-color: #FF5252;
            box-shadow: 0 0 10px #FF5252;
        }

        .btn-container {
            margin-top: 30px;
        }

        .cta-button {
            display: block;
            background: #ffd700;
            color: #000;
            text-decoration: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .cta-button:hover {
            background: #fff;
            transform: scale(1.05);
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.2);
        }

        .social-icons {
            margin-top: 25px;
            font-size: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .social-icons i {
            cursor: pointer;
            transition: color 0.3s;
        }

        .social-icons i:hover {
            color: #ffd700;
        }
    </style>
</head>

<body>

    <div class="glass-card">
        <h1 class="hotel-title">A1 Restaurant</h1>
        <p class="tagline">The Taste of Jamkhandi</p>

        <div class="info-row">
            <i class="fas fa-map-marker-alt"></i>
            <span>Tippu Sultan Circle, Jamkhandi</span>
        </div>
        <div class="info-row">
            <i class="fas fa-location-arrow"></i>
            <span>Pin: 587301</span>
        </div>

        <div class="menu-status">
            <div class="status-pill">
                <span class="dot dot-veg"></span> VEG
            </div>
            <div class="status-pill">
                <span class="dot dot-nonveg"></span> NON-VEG
            </div>
        </div>

        <div class="btn-container">
            <a href="https://www.google.com/maps/search/A1+Restaurant+Jamkhandi" target="_blank" class="cta-button">
                GET DIRECTIONS
            </a>
        </div>

        <div class="social-icons">
            <i class="fab fa-instagram"></i>
            <i class="fab fa-facebook"></i>
            <i class="fab fa-whatsapp"></i>
        </div>
    </div>

</body>

</html>
